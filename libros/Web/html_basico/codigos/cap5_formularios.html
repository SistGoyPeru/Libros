<!DOCTYPE html>
<!-- ============================================================
  Capítulo 5: Formularios
  Tema: Suscripción y contacto del periódico "La Voz del Barrio"
  ============================================================ -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suscripción · La Voz del Barrio</title>
</head>
<body>

  <h1>La Voz del Barrio</h1>
  <h2>Formulario de suscripción</h2>
  <p>Completa tus datos para recibir el periódico cada semana.</p>

  <!-- Formulario de suscripción -->
  <form action="enviar.php" method="post">

    <fieldset>
      <legend>Datos personales</legend>

      <p>
        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Lucía Heredia" required>
      </p>

      <p>
        <label for="email">Correo electrónico:</label><br>
        <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
      </p>

      <p>
        <label for="telefono">Teléfono (opcional):</label><br>
        <input type="tel" id="telefono" name="telefono" placeholder="+34 612 345 678">
      </p>

      <p>
        <label for="edad">Edad:</label><br>
        <input type="number" id="edad" name="edad" min="1" max="120">
      </p>

      <p>
        <label for="entrega">Tipo de suscripción:</label><br>
        <select id="entrega" name="entrega">
          <option value="semanal">Semanal (papel) — 5 €/mes</option>
          <option value="digital">Digital — 2 €/mes</option>
          <option value="completa">Completa (papel + digital) — 6 €/mes</option>
        </select>
      </p>
    </fieldset>

    <br>

    <fieldset>
      <legend>Preferencias</legend>

      <p>Secciones de interés:</p>
      <p>
        <input type="checkbox" id="sec-noticias" name="intereses" value="noticias">
        <label for="sec-noticias">Noticias</label><br>
        <input type="checkbox" id="sec-deportes" name="intereses" value="deportes">
        <label for="sec-deportes">Deportes</label><br>
        <input type="checkbox" id="sec-cultura" name="intereses" value="cultura">
        <label for="sec-cultura">Cultura</label><br>
        <input type="checkbox" id="sec-opinion" name="intereses" value="opinion">
        <label for="sec-opinion">Opinión</label>
      </p>

      <p>Frecuencia de envío:</p>
      <p>
        <input type="radio" id="frec-semanal" name="frecuencia" value="semanal" checked>
        <label for="frec-semanal">Semanal</label>
        <input type="radio" id="frec-quincenal" name="frecuencia" value="quincenal">
        <label for="frec-quincenal">Quincenal</label>
      </p>
    </fieldset>

    <br>

    <fieldset>
      <legend>Mensaje (opcional)</legend>
      <p>
        <label for="mensaje">¿Algo que contarnos?</label><br>
        <textarea id="mensaje" name="mensaje" rows="4" cols="50"
                  placeholder="Escribe tu mensaje aquí..."></textarea>
      </p>
    </fieldset>

    <br>
    <!-- Botones -->
    <button type="submit">Enviar suscripción</button>
    <button type="reset">Limpiar formulario</button>

  </form>

  <hr>

  <p><em>La Voz del Barrio</em> · C/ de la Prensa, 14</p>

</body>
</html>
