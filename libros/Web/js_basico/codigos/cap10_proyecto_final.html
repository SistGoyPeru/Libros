<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AprendeYa - Plataforma Educativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }
    .header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 1.5rem 2rem; text-align: center; }
    .header h1 { font-size: 1.8rem; }
    .header p { opacity: 0.85; margin-top: 0.3rem; }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card h2 { color: #2c3e50; margin-bottom: 1rem; font-size: 1.2rem; border-bottom: 2px solid #ecf0f1; padding-bottom: 0.5rem; }
    .full { grid-column: 1 / -1; }
    input { width: 100%; padding: 0.6rem; border: 2px solid #ddd; border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #3498db; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #3498db; color: white; width: 100%; }
    .btn-secondary { background: #2ecc71; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-small { background: #95a5a6; color: white; padding: 0.3rem 0.6rem; font-size: 0.8rem; float: right; }
    .login-box { text-align: center; }
    .login-box p { margin-bottom: 0.8rem; color: #666; }
    .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .curso-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem; margin: 0.3rem 0; background: #f8f9fa; border-radius: 6px; border-left: 4px solid #3498db; }
    .curso-item.completado { border-left-color: #27ae60; background: #eafaf1; }
    .curso-item span { font-size: 0.9rem; }
    .progreso-bar { height: 10px; background: #ecf0f1; border-radius: 5px; overflow: hidden; margin: 0.5rem 0; }
    .progreso-fill { height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); transition: width 0.4s; border-radius: 5px; width: 0%; }
    #mensajeLogin { color: #e74c3c; font-size: 0.85rem; margin-top: 0.3rem; }
  </style>
</head>
<body>

  <!-- ========== HEADER ========== -->
  <div class="header">
    <h1>📚 AprendeYa</h1>
    <p>Tu plataforma de aprendizaje interactivo</p>
  </div>

  <div class="container">

    <!-- ========== TARJETA: LOGIN SIMULADO ========== -->
    <div class="card" id="cardLogin">
      <h2>🔐 Iniciar sesión</h2>
      <div id="loginView">
        <input type="text" id="inputUsuario" placeholder="Usuario (admin / estudiante / profesor)">
        <button class="btn-primary" id="btnLogin">Entrar</button>
        <p id="mensajeLogin"></p>
      </div>
      <div id="perfilView" style="display:none;">
        <div class="user-info">
          <span id="nombreUsuario"></span>
          <span id="rolUsuario" style="background:#ecf0f1;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.8rem;"></span>
        </div>
        <button class="btn-danger" id="btnLogout" style="width:100%;">Cerrar sesión</button>
      </div>
    </div>

    <!-- ========== TARJETA: PROGRESO ========== -->
    <div class="card" id="cardProgreso">
      <h2>📊 Mi progreso</h2>
      <div class="progreso-bar">
        <div class="progreso-fill" id="progresoFill"></div>
      </div>
      <p id="progresoTexto" style="text-align:center;font-weight:bold;">0 / 6 lecciones</p>
      <button class="btn-secondary" id="btnGuardar" style="width:100%;margin-top:0.5rem;">💾 Guardar progreso</button>
    </div>

    <!-- ========== TARJETA: LISTA DE CURSOS ========== -->
    <div class="card full" id="cardCursos">
      <h2>📖 Cursos disponibles <button class="btn-small" id="btnReset">Reiniciar</button></h2>
      <div id="listaCursos"></div>
    </div>

  </div>

  <script>
    // ============================================================
    // DATOS DE LA PLATAFORMA
    // ============================================================
    const cursos = [
      "JavaScript Básico", "HTML y CSS", "React Avanzado",
      "Python Intro", "Node.js", "Bases de Datos"
    ];

    let usuario = null;        // objeto { nombre, rol }
    let progreso = {};         // { "JavaScript Básico": true, ... }

    // ============================================================
    // LOCALSTORAGE — cargar/guardar
    // ============================================================
    function cargarEstado() {
      const p = localStorage.getItem("aprendeya_progreso");
      if (p) progreso = JSON.parse(p);
      const u = localStorage.getItem("aprendeya_usuario");
      if (u) usuario = JSON.parse(u);
    }

    function guardarEstado() {
      localStorage.setItem("aprendeya_progreso", JSON.stringify(progreso));
      if (usuario) {
        localStorage.setItem("aprendeya_usuario", JSON.stringify(usuario));
      } else {
        localStorage.removeItem("aprendeya_usuario");
      }
    }

    // ============================================================
    // LOGIN / LOGOUT
    // ============================================================
    const loginView = document.getElementById("loginView");
    const perfilView = document.getElementById("perfilView");

    function actualizarLogin() {
      if (usuario) {
        loginView.style.display = "none";
        perfilView.style.display = "block";
        document.getElementById("nombreUsuario").textContent = `👤 ${usuario.nombre}`;
        document.getElementById("rolUsuario").textContent = usuario.rol;
      } else {
        loginView.style.display = "block";
        perfilView.style.display = "none";
      }
    }

    document.getElementById("btnLogin").addEventListener("click", () => {
      const nombre = document.getElementById("inputUsuario").value.trim();
      if (!nombre) {
        document.getElementById("mensajeLogin").textContent = "Ingresa un nombre de usuario.";
        return;
      }
      // Simular roles según el nombre
      let rol = "estudiante";
      if (nombre.toLowerCase() === "admin") rol = "admin";
      else if (nombre.toLowerCase() === "profesor") rol = "profesor";

      usuario = { nombre, rol };
      document.getElementById("inputUsuario").value = "";
      document.getElementById("mensajeLogin").textContent = "";
      actualizarLogin();
      guardarEstado();
      renderizarCursos();
      actualizarProgreso();
      console.log(`✅ Sesión iniciada: ${usuario.nombre} (${usuario.rol})`);
    });

    document.getElementById("btnLogout").addEventListener("click", () => {
      usuario = null;
      actualizarLogin();
      guardarEstado();
      console.log("🔓 Sesión cerrada.");
    });

    // ============================================================
    // LISTA DE CURSOS
    // ============================================================
    function renderizarCursos() {
      const contenedor = document.getElementById("listaCursos");
      contenedor.innerHTML = "";

      cursos.forEach(curso => {
        const div = document.createElement("div");
        div.className = "curso-item" + (progreso[curso] ? " completado" : "");
        div.innerHTML = `
          <span>${progreso[curso] ? "✅" : "⬜"} ${curso}</span>
          <button class="btn-secondary" data-curso="${curso}">
            ${progreso[curso] ? "Desmarcar" : "Completar"}
          </button>
        `;

        div.querySelector("button").addEventListener("click", () => {
          progreso[curso] = !progreso[curso];
          renderizarCursos();
          actualizarProgreso();
        });

        contenedor.appendChild(div);
      });
    }

    // ============================================================
    // PROGRESO
    // ============================================================
    function actualizarProgreso() {
      const total = cursos.length;
      const hechas = Object.values(progreso).filter(v => v).length;
      const pct = Math.round((hechas / total) * 100);

      document.getElementById("progresoFill").style.width = pct + "%";
      document.getElementById("progresoTexto").textContent = `${hechas} / ${total} lecciones`;
    }

    // ============================================================
    // GUARDAR / RESET
    // ============================================================
    document.getElementById("btnGuardar").addEventListener("click", () => {
      guardarEstado();
      alert("💾 ¡Progreso guardado en localStorage!");
    });

    document.getElementById("btnReset").addEventListener("click", () => {
      if (confirm("¿Reiniciar todo el progreso?")) {
        localStorage.removeItem("aprendeya_progreso");
        progreso = {};
        renderizarCursos();
        actualizarProgreso();
        console.log("🗑️ Progreso reiniciado.");
      }
    });

    // ============================================================
    // INICIALIZAR
    // ============================================================
    cargarEstado();
    actualizarLogin();
    renderizarCursos();
    actualizarProgreso();
  </script>
</body>
</html>
