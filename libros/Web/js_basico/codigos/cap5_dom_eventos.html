<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AprendeYa - Menú Interactivo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; background: #f4f7fa; }
    .menu { display: flex; gap: 0; border-radius: 8px; overflow: hidden; }
    .menu-item { padding: 0.8rem 1.5rem; background: #2c3e50; color: white; cursor: pointer; transition: background 0.3s; flex: 1; text-align: center; }
    .menu-item:hover { background: #3498db; }
    .menu-item.activo { background: #1abc9c; }
    #contenido { background: white; padding: 1.5rem; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 0; min-height: 120px; }
  </style>
</head>
<body>
  <h1>🧭 AprendeYa — Menú Interactivo</h1>
  <div class="menu" id="menu">
    <div class="menu-item" data-seccion="inicio">Inicio</div>
    <div class="menu-item" data-seccion="cursos">Cursos</div>
    <div class="menu-item" data-seccion="perfil">Perfil</div>
    <div class="menu-item" data-seccion="ayuda">Ayuda</div>
  </div>
  <div id="contenido">Bienvenido a AprendeYa. Haz clic en una opción del menú.</div>

  <script>
    // ============================================================
    // 1. querySelector — seleccionar elementos del DOM
    // ============================================================
    const menuItems = document.querySelectorAll(".menu-item");
    const contenido = document.querySelector("#contenido");

    // ============================================================
    // 2. Datos de cada sección
    // ============================================================
    const secciones = {
      inicio:  "🏠 Bienvenido a <strong>AprendeYa</strong>. Tu plataforma de aprendizaje online.",
      cursos:  "📚 Explora nuestros cursos de programación, diseño y más.",
      perfil:  "👤 Aquí puedes ver tu progreso y certificados obtenidos.",
      ayuda:   "❓ Preguntas frecuentes y soporte técnico."
    };

    // ============================================================
    // 3. addEventListener — escuchar eventos
    // ============================================================
    menuItems.forEach(item => {
      // --- evento click ---
      item.addEventListener("click", function () {
        // --- quitar clase 'activo' de todos ---
        menuItems.forEach(el => el.classList.remove("activo"));
        // --- agregar clase al que se hizo clic ---
        this.classList.add("activo");

        const seccion = this.dataset.seccion; // dataset = data-*
        contenido.innerHTML = secciones[seccion] || "Sección no encontrada.";
      });

      // --- evento mouseover (solo para demostración) ---
      item.addEventListener("mouseover", function () {
        console.log(`Mouse sobre: ${this.dataset.seccion}`);
      });
    });
  </script>
</body>
</html>
