<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AprendeYa - Variables y Tipos</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; background: #f4f7fa; }
    .caja { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; }
    #output { background: #ecf0f1; padding: 1rem; border-radius: 6px; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="caja">
    <h1>📚 AprendeYa — Variables y Tipos de Datos</h1>
    <p>Abre la consola (F12) para ver los <code>console.log</code>.</p>
    <div id="output"></div>
  </div>

  <script>
    // ============================================================
    // 1. Variables con let (puede reasignarse)
    // ============================================================
    let nombreCurso = "JavaScript Básico";        // string
    let precio = 0;                               // number
    precio = 19.99;                               // reasignamos el valor

    // ============================================================
    // 2. Constante con const (no puede reasignarse)
    // ============================================================
    const PLATAFORMA = "AprendeYa";
    const ANIO = 2026;

    // ============================================================
    // 3. Tipos de datos: string, number, boolean, undefined, null
    // ============================================================
    let activo = true;                            // boolean
    let descripcion = "Curso introductorio";       // string
    let duracionHoras = 40;                       // number
    let categoria;                                // undefined
    let certificado = null;                       // null

    // ============================================================
    // 4. typeof: nos dice el tipo de cada variable
    // ============================================================
    console.log("=== TIPOS DE DATOS (AprendeYa) ===");
    console.log("nombreCurso:", nombreCurso, "-> tipo:", typeof nombreCurso);
    console.log("precio:", precio, "-> tipo:", typeof precio);
    console.log("activo:", activo, "-> tipo:", typeof activo);
    console.log("categoria:", categoria, "-> tipo:", typeof categoria);
    console.log("certificado:", certificado, "-> tipo:", typeof certificado);
    console.log("PLATAFORMA:", PLATAFORMA, "-> tipo:", typeof PLATAFORMA);

    // ============================================================
    // 5. Mostrar en la página
    // ============================================================
    const output = document.getElementById("output");
    output.innerHTML = `
      <p><strong>Curso:</strong> ${nombreCurso}</p>
      <p><strong>Precio:</strong> $${precio}</p>
      <p><strong>Plataforma:</strong> ${PLATAFORMA} (${ANIO})</p>
      <p><strong>¿Activo?</strong> ${activo}</p>
      <p><strong>Tipo de 'precio':</strong> ${typeof precio}</p>
    `;
  </script>
</body>
</html>
