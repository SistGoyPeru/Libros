services:
  - type: web
    name: epub-visor
    runtime: python
    buildCommand: "cd epub_visor && bash build.sh"
    startCommand: "cd epub_visor && python manage.py migrate --no-input && gunicorn epub_visor.wsgi:application --bind 0.0.0.0:$PORT --workers 4"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,http://localhost:8000"
      - key: DATABASE_URL
        fromDatabase:
          name: epub-visor-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        value: t1dm8n8n
      - key: CLOUDINARY_API_KEY
        value: 426968231156249
      - key: CLOUDINARY_API_SECRET
        value: gQF5efgdVmlxG0S_s909fFOEYLY
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: epub-visor-db
    databaseName: epub_visor
    user: epub_visor
    plan: free
