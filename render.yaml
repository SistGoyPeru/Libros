services:
  - type: web
    name: epub-visor
    runtime: python
    buildCommand: "cd epub_visor && bash build.sh"
    startCommand: "cd epub_visor && gunicorn epub_visor.wsgi:application --bind 0.0.0.0:$PORT --workers 4"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: epub-visor-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: epub-visor-db
    databaseName: epub_visor
    user: epub_visor
    plan: free
