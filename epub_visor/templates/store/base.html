<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tienda{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <h1>Librería Virtual</h1>
                <p>Tu espacio para vender libros digitales con estilo de librería.</p>
            </div>
            <nav class="site-nav">
                <a href="/">Inicio</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'store_dashboard' %}">Dashboard</a>
                    <a href="{% url 'admin_logout' %}">Salir</a>
                {% else %}
                    <a href="{% url 'admin_access' %}">Admin</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Proyecto Django para tienda de libros.</p>
    </footer>
</body>
</html>
