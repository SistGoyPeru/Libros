<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portafolio de Alex Goyzueta Delgado{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand logo-brand">
                <img src="{% static 'logo.jpg' %}" alt="Alex Goyzueta Delgado" class="brand-logo">
                <div>
                    <h1>Alex Goyzueta Delgado</h1>
                    <p>Analista de datos freelance y autor de libros digitales.</p>
                </div>
            </div>
            <nav class="site-nav">
                <a href="/">Inicio</a>
                <a href="{% url 'store_dashboard' %}">Dashboard</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'admin_logout' %}">Salir</a>
                {% else %}
                    <a href="{% url 'admin_access' %}">Admin</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Portafolio de Alex Goyzueta Delgado — Analista de datos freelance.</p>
    </footer>
</body>
</html>
