{% extends 'visor/base.html' %}
{% block title %}Registrarse{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto;">
  <div class="card" style="padding:2rem;">
    <h1 style="font-size:1.5rem;margin-bottom:1.5rem;text-align:center;">Crear Cuenta</h1>

    {% if messages %}
    {% for msg in messages %}
    <div class="error-msg">{{ msg }}</div>
    {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div style="margin-bottom:1rem;">
        <label style="display:block;margin-bottom:0.3rem;color:var(--fg2);font-size:0.9rem;">Usuario</label>
        <input type="text" name="username" required
               style="width:100%;padding:0.6rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:inherit;">
      </div>
      <div style="margin-bottom:1rem;">
        <label style="display:block;margin-bottom:0.3rem;color:var(--fg2);font-size:0.9rem;">Contraseña</label>
        <input type="password" name="password" required
               style="width:100%;padding:0.6rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:inherit;">
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block;margin-bottom:0.3rem;color:var(--fg2);font-size:0.9rem;">Repetir contraseña</label>
        <input type="password" name="password2" required
               style="width:100%;padding:0.6rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:inherit;">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Crear Cuenta</button>
    </form>

    <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--fg2);">
      ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
    </p>
  </div>
</div>
{% endblock %}
