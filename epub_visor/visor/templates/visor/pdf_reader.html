{% extends 'visor/base.html' %}
{% block title %}Leyendo PDF: {{ book.title }}{% endblock %}
{% block extra_head %}
<style>
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .top-bar, .cat-bar { display: none; }
  .footer { display: none; }
  .container { max-width: none; padding: 0; flex: 1; display: flex; flex-direction: column; }

  * { -webkit-user-select: none; user-select: none; -moz-user-select: none; -ms-user-select: none; }
  img { -webkit-user-drag: none; user-drag: none; }

  .pdf-navbar {
    background: #222;
    border-bottom: 1px solid #333;
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .pdf-navbar a, .pdf-navbar button {
    color: #ccc;
    background: #333;
    border: 1px solid #444;
    padding: 0.3rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    text-decoration: none;
  }
  .pdf-navbar a:hover, .pdf-navbar button:hover { background: #444; color: #fff; }
  .pdf-navbar .title { color: #d4a54a; font-weight: 600; font-size: 0.9rem; }
  .pdf-navbar .page-info { color: #888; font-size: 0.8rem; }

  #pdf-canvas-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 1rem;
    background: #1a1a1a;
  }
  #pdf-canvas-container canvas {
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    margin-bottom: 1rem;
    max-width: 100%;
    height: auto !important;
  }
  .pdf-loading {
    color: #888;
    text-align: center;
    padding: 3rem;
    font-size: 1.2rem;
  }

  @media print { body { display: none !important; } }
</style>
<script>
document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey) {
    if ([67,86,83,80,85,73,74,75,76,65,70].includes(e.keyCode) || e.key === 'PrintScreen') {
      e.preventDefault(); return false;
    }
  }
  if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73)) {
    e.preventDefault(); return false;
  }
});
document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
document.addEventListener('cut', function(e) { e.preventDefault(); return false; });
document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
document.addEventListener('selectstart', function(e) { e.preventDefault(); return false; });
</script>
{% endblock %}

{% block content %}
{% load static %}
<div class="pdf-navbar">
  <div>
    <a href="{% url 'book_detail' book.slug %}">← Volver</a>
    <span class="title">{{ book.title }}</span>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <button onclick="pdfPrevPage()">← Anterior</button>
    <span class="page-info"><span id="page-info">1</span> / <span id="total-pages">?</span></span>
    <button onclick="pdfNextPage()">Siguiente →</button>
  </div>
</div>
<div id="pdf-canvas-container">
  <div class="pdf-loading" id="pdf-loading-msg">Cargando PDF...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var pdfDoc = null;
var currentPage = 1;
var totalPages = 0;
var pdfScale = 1.2;

function pdfRenderPage(num) {
  var container = document.getElementById('pdf-canvas-container');
  if (!pdfDoc || !container) return;
  var canvas = document.createElement('canvas');
  canvas.id = 'pdf-canvas-' + num;
  container.innerHTML = '';
  container.appendChild(canvas);

  pdfDoc.getPage(num).then(function(page) {
    var viewport = page.getViewport({ scale: pdfScale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    var ctx = canvas.getContext('2d');
    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function() {
      document.getElementById('page-info').textContent = num + ' / ' + totalPages;
    });
  });
}

function pdfPrevPage() {
  if (currentPage > 1) { currentPage--; pdfRenderPage(currentPage); }
}

function pdfNextPage() {
  if (currentPage < totalPages) { currentPage++; pdfRenderPage(currentPage); }
}

function pdfLoad() {
  var container = document.getElementById('pdf-canvas-container');
  if (!container) return;
  var url = '{% url "serve_pdf" book.slug %}';
  pdfjsLib.getDocument(url).promise.then(function(pdf) {
    pdfDoc = pdf;
    totalPages = pdf.numPages;
    document.getElementById('total-pages').textContent = totalPages;
    pdfRenderPage(1);
  }).catch(function(err) {
    container.innerHTML = '<div class="pdf-loading">Error al cargar el PDF</div>';
  });
}

document.addEventListener('DOMContentLoaded', pdfLoad);
</script>
{% endblock %}
