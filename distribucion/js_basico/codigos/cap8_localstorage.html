<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AprendeYa - Guardar Progreso</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #f4f7fa; }
    .caja { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; }
    .leccion { padding: 0.6rem; margin: 0.4rem 0; border-radius: 6px; background: #ecf0f1; cursor: pointer; display: flex; justify-content: space-between; }
    .leccion.completada { background: #d4edda; text-decoration: line-through; color: #155724; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; margin: 0.25rem; }
    .btn-reset { background: #e74c3c; color: white; }
    .btn-guardar { background: #27ae60; color: white; }
    #estado { background: #f8f9fa; padding: 0.8rem; border-radius: 6px; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="caja">
    <h1>💾 AprendeYa — Tu Progreso</h1>
    <p>Haz clic en una lección para marcarla como completada.</p>

    <div id="listaLecciones"></div>

    <button class="btn-guardar" id="btnGuardar">💾 Guardar progreso</button>
    <button class="btn-reset" id="btnReset">🗑️ Reiniciar progreso</button>

    <div id="estado">📌 Progreso actual: 0%</div>
  </div>

  <script>
    // ============================================================
    // 1. Datos de las lecciones
    // ============================================================
    const lecciones = [
      "Variables y tipos", "Condicionales", "Funciones",
      "Arrays y objetos", "DOM y eventos", "Formularios"
    ];

    let progreso = {}; // ej: { "Variables y tipos": true, ... }

    // ============================================================
    // 2. Cargar desde localStorage al iniciar
    // ============================================================
    function cargarProgreso() {
      const guardado = localStorage.getItem("aprendeya_progreso");
      if (guardado) {
        progreso = JSON.parse(guardado); // JSON.parse — convierte string a objeto
        console.log("📂 Progreso cargado:", progreso);
      }
    }

    // ============================================================
    // 3. Guardar en localStorage
    // ============================================================
    function guardarProgreso() {
      // JSON.stringify — convierte objeto a string
      localStorage.setItem("aprendeya_progreso", JSON.stringify(progreso));
      console.log("💾 Progreso guardado.");
    }

    // ============================================================
    // 4. Renderizar la lista de lecciones
    // ============================================================
    function renderizar() {
      const contenedor = document.getElementById("listaLecciones");
      contenedor.innerHTML = "";

      lecciones.forEach(lec => {
        const div = document.createElement("div");
        div.className = "leccion" + (progreso[lec] ? " completada" : "");
        div.innerHTML = `<span>${lec}</span><span>${progreso[lec] ? "✅" : "⬜"}</span>`;

        // Hacer clic = alternar estado
        div.addEventListener("click", () => {
          progreso[lec] = !progreso[lec];
          renderizar();
        });

        contenedor.appendChild(div);
      });

      actualizarEstado();
    }

    // ============================================================
    // 5. Actualizar porcentaje
    // ============================================================
    function actualizarEstado() {
      const total = lecciones.length;
      const hechas = Object.values(progreso).filter(v => v).length;
      const pct = Math.round((hechas / total) * 100);
      document.getElementById("estado").textContent = `📌 Progreso actual: ${pct}% (${hechas}/${total})`;
    }

    // ============================================================
    // 6. Eventos
    // ============================================================
    document.getElementById("btnGuardar").addEventListener("click", guardarProgreso);

    document.getElementById("btnReset").addEventListener("click", () => {
      localStorage.removeItem("aprendeya_progreso"); // removeItem
      progreso = {};
      renderizar();
      console.log("🗑️ Progreso eliminado.");
    });

    // Inicializar
    cargarProgreso();
    renderizar();
  </script>
</body>
</html>
