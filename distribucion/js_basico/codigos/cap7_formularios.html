<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AprendeYa - Formulario de Registro</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; background: #f4f7fa; }
    .caja { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; }
    .campo { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; }
    input { width: 100%; padding: 0.5rem; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
    input.invalido { border-color: #e74c3c; background: #fce4e4; }
    input.valido { border-color: #27ae60; background: #eafaf1; }
    .error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.2rem; display: none; }
    .visible { display: block; }
    button { width: 100%; padding: 0.7rem; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { opacity: 0.9; }
    #exito { display: none; background: #d4edda; color: #155724; padding: 1rem; border-radius: 6px; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="caja">
    <h1>📝 AprendeYa — Registro</h1>

    <form id="formRegistro">
      <div class="campo">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej: Ana Pérez">
        <div class="error" id="errorNombre">Mínimo 3 caracteres.</div>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com">
        <div class="error" id="errorEmail">Ingresa un email válido.</div>
      </div>

      <div class="campo">
        <label for="edad">Edad</label>
        <input type="number" id="edad" placeholder="18 o más">
        <div class="error" id="errorEdad">Debes tener al menos 18 años.</div>
      </div>

      <button type="submit">Registrarse</button>
    </form>

    <div id="exito">✅ ¡Registro exitoso en AprendeYa!</div>
  </div>

  <script>
    // ============================================================
    // 1. Seleccionar elementos del formulario
    // ============================================================
    const form = document.getElementById("formRegistro");
    const nombre = document.getElementById("nombre");
    const email = document.getElementById("email");
    const edad = document.getElementById("edad");

    // ============================================================
    // 2. Validación en tiempo real con evento 'input'
    // ============================================================
    nombre.addEventListener("input", () => validarNombre());
    email.addEventListener("input", () => validarEmail());
    edad.addEventListener("input", () => validarEdad());

    function validarNombre() {
      const valido = nombre.value.trim().length >= 3;
      nombre.className = valido ? "valido" : "invalido";
      document.getElementById("errorNombre").classList.toggle("visible", !valido);
      return valido;
    }

    function validarEmail() {
      const valido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
      email.className = valido ? "valido" : "invalido";
      document.getElementById("errorEmail").classList.toggle("visible", !valido);
      return valido;
    }

    function validarEdad() {
      const valido = Number(edad.value) >= 18;
      edad.className = valido ? "valido" : "invalido";
      document.getElementById("errorEdad").classList.toggle("visible", !valido);
      return valido;
    }

    // ============================================================
    // 3. Evento submit — preventDefault
    // ============================================================
    form.addEventListener("submit", (e) => {
      e.preventDefault(); // evitar que recargue la página

      const ok = validarNombre() & validarEmail() & validarEdad();

      if (ok) {
        document.getElementById("exito").style.display = "block";
        console.log("✅ Registro completado:", {
          nombre: nombre.value,
          email: email.value,
          edad: edad.value
        });
      } else {
        alert("❌ Corrige los errores antes de enviar.");
      }
    });
  </script>
</body>
</html>
