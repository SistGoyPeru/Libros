<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AprendeYa - Manipulación del DOM</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; background: #f4f7fa; }
    .caja { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; }
    button { padding: 0.5rem 1rem; margin: 0.25rem; border: none; border-radius: 6px; cursor: pointer; }
    .btn-add { background: #27ae60; color: white; }
    .btn-toggle { background: #f39c12; color: white; }
    .btn-remove { background: #e74c3c; color: white; }
    .oculto { display: none; }
    .destacado { background: #fff3cd; border: 2px solid #ffc107; padding: 0.5rem; }
    #lista li { padding: 0.4rem; margin: 0.3rem 0; background: #ecf0f1; border-radius: 4px; list-style: none; }
  </style>
</head>
<body>
  <div class="caja">
    <h1>🛠️ AprendeYa — Manipulación del DOM</h1>

    <button id="btnToggle" class="btn-toggle">Mostrar/Ocultar info</button>
    <button id="btnAdd" class="btn-add">Agregar tema</button>
    <button id="btnDestacar" class="btn-toggle">Destacar/Quitar</button>

    <div id="info" class="oculto">
      <p>📖 <strong>JavaScript Básico</strong> — Aprende variables, funciones, DOM y más.</p>
    </div>

    <h3>Temas del curso:</h3>
    <ul id="lista">
      <li>Variables y tipos</li>
      <li>Condicionales</li>
      <li>Funciones</li>
    </ul>
  </div>

  <script>
    // ============================================================
    // 1. classList.toggle — mostrar/ocultar
    // ============================================================
    const info = document.getElementById("info");

    document.getElementById("btnToggle").addEventListener("click", () => {
      info.classList.toggle("oculto");
    });

    // ============================================================
    // 2. classList.add / classList.remove
    // ============================================================
    const btnDestacar = document.getElementById("btnDestacar");
    let destacado = false;

    btnDestacar.addEventListener("click", () => {
      if (destacado) {
        btnDestacar.classList.remove("destacado");
        btnDestacar.textContent = "Destacar/Quitar";
        destacado = false;
      } else {
        btnDestacar.classList.add("destacado");
        btnDestacar.textContent = "✨ ¡Destacado!";
        destacado = true;
      }
    });

    // ============================================================
    // 3. createElement + appendChild + innerHTML
    // ============================================================
    const lista = document.getElementById("lista");
    let contador = 4;

    document.getElementById("btnAdd").addEventListener("click", () => {
      const nuevoItem = document.createElement("li");   // createElement
      nuevoItem.innerHTML = `Tema nuevo #${contador}`;  // innerHTML
      lista.appendChild(nuevoItem);                     // appendChild
      contador++;
    });
  </script>
</body>
</html>
