<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AprendeYa - Funciones</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; background: #f4f7fa; }
    .caja { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; }
    #resultado { background: #ecf0f1; padding: 1rem; border-radius: 6px; margin-top: 1rem; white-space: pre-line; }
    input, button { padding: 0.5rem 1rem; font-size: 1rem; border-radius: 6px; border: 1px solid #ccc; }
    button { background: #27ae60; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="caja">
    <h1>📊 AprendeYa — Funciones y Progreso</h1>
    <label>Lecciones completadas: <input type="number" id="lecciones" value="5" min="0"></label>
    <button id="btnCalcular">Calcular progreso</button>
    <div id="resultado">Presiona el botón para ver el progreso.</div>
  </div>

  <script>
    // ============================================================
    // 1. Función declarada — calcula el porcentaje
    // ============================================================
    const TOTAL_LECCIONES = 10; // scope: global

    function calcularPorcentaje(completadas) {
      // completadas = parámetro
      return (completadas / TOTAL_LECCIONES) * 100;
    }

    // ============================================================
    // 2. Arrow function — genera un resumen
    // ============================================================
    const generarResumen = (nombreCurso, completadas) => {
      // Arrow function con dos parámetros
      const porcentaje = calcularPorcentaje(completadas);
      return `Curso: ${nombreCurso}
Lecciones completadas: ${completadas} de ${TOTAL_LECCIONES}
Progreso: ${porcentaje}%`;
    };

    // ============================================================
    // 3. Scope: variable local vs global
    // ============================================================
    function mostrarProgreso() {
      const input = document.getElementById("lecciones");
      const completadas = Number(input.value); // scope: local

      if (completadas < 0 || completadas > TOTAL_LECCIONES) {
        document.getElementById("resultado").textContent = "⚠️ Valor inválido (0-10).";
        return; // salida temprana
      }

      const resumen = generarResumen("JavaScript Básico", completadas);

      // scope global: TOTAL_LECCIONES disponible
      // scope local: completadas, resumen NO disponibles fuera
      document.getElementById("resultado").textContent = resumen;

      // También mostramos en consola
      console.log("Función ejecutada:", resumen);
    }

    // ============================================================
    // 4. Evento
    // ============================================================
    document.getElementById("btnCalcular").addEventListener("click", mostrarProgreso);
  </script>
</body>
</html>
